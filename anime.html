<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime List - AniArena</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #111122;
            --card-bg: #1a1a2e;
            --primary: #ff6b35;
            --secondary: #a855f7;
            --text-color: #eee;
            --text-muted: #aaa;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: transparent;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--primary);
        }

        nav a.active {
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
        }

        .user-icon {
            color: var(--text-color);
            font-size: 20px;
            text-decoration: none;
        }

        /* Main Container */
        main {
            flex: 1;
            padding: 60px 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .page-title {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        /* Anime Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
        }

        .anime-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .anime-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.2);
            border-color: rgba(255, 107, 53, 0.5);
        }

        .anime-image {
            width: 100%;
            height: 200px;
            background-color: #2a2a4a;
            object-fit: cover;
            border-bottom: 2px solid var(--primary);
        }

        .anime-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .anime-title {
            color: var(--text-color);
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .anime-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .anime-genre {
            color: var(--secondary);
            font-weight: 600;
        }

        .anime-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
            flex: 1;
        }

        .btn-view {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 0;
            border-radius: 25px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            width: 100%;
            display: block;
        }

        .btn-view:hover {
            background-color: var(--primary);
            color: white;
        }

        /* Footer */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            background-color: rgba(10, 10, 20, 0.8);
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .footer-logo {
            color: var(--primary);
            font-weight: 800;
            font-size: 18px;
            text-decoration: none;
        }

        .copyright {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 5px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: white;
        }
        
        @media (max-width: 900px) {
            .page-title {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">AniArena</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html">Play</a></li>
                <li><a href="how-to-play.html">How to Play</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="anime.html" class="active">Anime</a></li>
            </ul>
        </nav>
        <a href="#" class="user-icon">👤</a>
    </header>

    <main>
        <h1 class="page-title">Anime Database</h1>
        <p style="text-align: center; color: var(--text-muted); margin-top: -30px; margin-bottom: 20px;">
            Explore our collection of anime. (Currently using static data, database integration coming soon!)
        </p>

        <div class="anime-grid" id="animeGrid">
            <!-- Anime cards will be inserted here by JavaScript -->
        </div>

        <!-- Pagination Controls -->
        <div class="pagination" id="paginationControls" style="display: flex; justify-content: center; gap: 20px; margin-top: 40px;">
            <button id="prevPageBtn" class="btn-view" style="width: auto; padding: 10px 30px;" disabled>Previous</button>
            <span id="pageIndicator" style="align-self: center; font-weight: 600; color: var(--text-color);">Page 1</span>
            <button id="nextPageBtn" class="btn-view" style="width: auto; padding: 10px 30px;">Next</button>
        </div>
    </main>

    <footer>
        <div>
            <a href="index.html" class="footer-logo">ANIARENA</a>
            <div class="copyright">&copy; 2026 Pixel_01 Studios. All rights reserved.</div>
        </div>
        <div class="footer-links">
            <a href="#">PRIVACY</a>
            <a href="#">TERMS</a>
            <a href="#">DISCORD</a>
            <a href="#">TWITTER</a>
        </div>
    </footer>

    <script>
        // The URL to your Cloudflare Worker (Replace YOUR_WORKER_URL with the actual URL)
        const API_URL = 'https://YOUR_WORKER_URL.workers.dev/anime'; 

        let currentPage = 1;
        const limit = 10;

        // Function to render anime cards
        async function fetchAndRenderAnime() {
            const grid = document.getElementById('animeGrid');
            const pageIndicator = document.getElementById('pageIndicator');
            const prevBtn = document.getElementById('prevPageBtn');
            const nextBtn = document.getElementById('nextPageBtn');

            grid.innerHTML = '<p style="text-align:center; width:100%; color:var(--text-muted);">Loading anime from Cloudflare...</p>';

            // Update Pagination UI state
            pageIndicator.textContent = `Page ${currentPage}`;
            prevBtn.disabled = currentPage === 1;
            prevBtn.style.opacity = currentPage === 1 ? '0.5' : '1';
            prevBtn.style.cursor = currentPage === 1 ? 'not-allowed' : 'pointer';

            try {
                // Fetch data from your Cloudflare Worker API with pagination
                const response = await fetch(`${API_URL}?page=${currentPage}&limit=${limit}`);
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                
                const animeData = await response.json();
                grid.innerHTML = ''; // Clear loading text

                if (animeData.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; width:100%; color:var(--text-muted);">No anime found on this page.</p>';
                    nextBtn.disabled = true;
                    nextBtn.style.opacity = '0.5';
                    nextBtn.style.cursor = 'not-allowed';
                    return;
                }

                // If we got fewer items than the limit, we're probably on the last page
                if (animeData.length < limit) {
                    nextBtn.disabled = true;
                    nextBtn.style.opacity = '0.5';
                    nextBtn.style.cursor = 'not-allowed';
                } else {
                    nextBtn.disabled = false;
                    nextBtn.style.opacity = '1';
                    nextBtn.style.cursor = 'pointer';
                }

                animeData.forEach(anime => {
                    const card = document.createElement('div');
                    card.className = 'anime-card';
                    
                    // Fallbacks for missing data since your current mock API only returns id, name, and genre
                    const title = anime.title || anime.name || 'Unknown Title';
                    const genre = anime.genre || 'Unknown Genre';
                    const rating = anime.rating || 'N/A';
                    const episodes = anime.episodes || '?';
                    const desc = anime.description || 'No description available.';
                    const image = anime.image || 'https://via.placeholder.com/600x400/2a2a4a/eee?text=No+Image';

                    card.innerHTML = `
                        <img src="${image}" alt="${title}" class="anime-image">
                        <div class="anime-info">
                            <h3 class="anime-title">${title}</h3>
                            <div class="anime-meta">
                                <span class="anime-genre">${genre}</span>
                                <span>★ ${rating}</span>
                            </div>
                            <p class="anime-desc">${desc}</p>
                            <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 15px;">
                                <span>Episodes: ${episodes}${episodes >= 1000 ? '+' : ''}</span>
                            </div>
                            <a href="#" class="btn-view" onclick="event.preventDefault(); alert('Details page coming soon!');">View Details</a>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching anime:', error);
                grid.innerHTML = '<p style="text-align:center; width:100%; color:#f87171;">Failed to load data. Please check your Cloudflare Worker URL and CORS settings.</p>';
            }
        }

        // Pagination Event Listeners
        document.getElementById('prevPageBtn').addEventListener('click', (e) => {
            e.preventDefault();
            if (currentPage > 1) {
                currentPage--;
                fetchAndRenderAnime();
            }
        });

        document.getElementById('nextPageBtn').addEventListener('click', (e) => {
            e.preventDefault();
            currentPage++;
            fetchAndRenderAnime();
        });

        // Initialize rendering
        document.addEventListener('DOMContentLoaded', fetchAndRenderAnime);
    </script>
    
</body>
</html>
