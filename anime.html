<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime List - AniArena</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #111122;
            --card-bg: #1a1a2e;
            --primary: #ff6b35;
            --secondary: #a855f7;
            --text-color: #eee;
            --text-muted: #aaa;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: transparent;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--primary);
        }

        nav a.active {
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
        }

        .user-icon {
            color: var(--text-color);
            font-size: 20px;
            text-decoration: none;
        }

        /* Main Container */
        main {
            flex: 1;
            padding: 60px 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .page-title {
            text-align: center;
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        /* Anime Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
        }

        .anime-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .anime-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(255, 107, 53, 0.2);
            border-color: rgba(255, 107, 53, 0.5);
        }

        .anime-image {
            width: 100%;
            height: 200px;
            background-color: #2a2a4a;
            object-fit: cover;
            border-bottom: 2px solid var(--primary);
        }

        .anime-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .anime-title {
            color: var(--text-color);
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .anime-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .anime-genre {
            color: var(--secondary);
            font-weight: 600;
        }

        .anime-desc {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
            flex: 1;
        }

        .btn-view {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 0;
            border-radius: 25px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            width: 100%;
            display: block;
        }

        .btn-view:hover {
            background-color: var(--primary);
            color: white;
        }

        /* Footer */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            background-color: rgba(10, 10, 20, 0.8);
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        .footer-logo {
            color: var(--primary);
            font-weight: 800;
            font-size: 18px;
            text-decoration: none;
        }

        .copyright {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 5px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: white;
        }
        
        @media (max-width: 900px) {
            .page-title {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">AniArena</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html">Play</a></li>
                <li><a href="how-to-play.html">How to Play</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="anime.html" class="active">Anime</a></li>
            </ul>
        </nav>
        <a href="#" class="user-icon">👤</a>
    </header>

    <main>
        <h1 class="page-title">Anime Database</h1>
        <p style="text-align: center; color: var(--text-muted); margin-top: -30px; margin-bottom: 20px;">
            Explore our collection of anime. (Currently using static data, database integration coming soon!)
        </p>

        <div class="anime-grid" id="animeGrid">
            <!-- Anime cards will be inserted here by JavaScript -->
        </div>
    </main>

    <footer>
        <div>
            <a href="index.html" class="footer-logo">ANIARENA</a>
            <div class="copyright">&copy; 2026 Pixel_01 Studios. All rights reserved.</div>
        </div>
        <div class="footer-links">
            <a href="#">PRIVACY</a>
            <a href="#">TERMS</a>
            <a href="#">DISCORD</a>
            <a href="#">TWITTER</a>
        </div>
    </footer>

    <script>
        // Static Anime Data (to be replaced by database fetch later)
        const animeData = [
            {
                id: 1,
                title: "Naruto: Shippuden",
                genre: "Action, Adventure",
                episodes: 500,
                rating: 8.7,
                image: "https://images.unsplash.com/photo-1578632292335-df3fbc1862d1?q=80&w=600&auto=format&fit=crop",
                description: "Naruto Uzumaki is a loud, hyperactive, adolescent ninja who constantly searches for approval and recognition."
            },
            {
                id: 2,
                title: "One Piece",
                genre: "Action, Adventure",
                episodes: 1000,
                rating: 8.9,
                image: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=600&auto=format&fit=crop",
                description: "Follows the adventures of Monkey D. Luffy and his pirate crew in order to find the greatest treasure ever left by the legendary Pirate."
            },
            {
                id: 3,
                title: "Attack on Titan",
                genre: "Action, Dark Fantasy",
                episodes: 89,
                rating: 9.0,
                image: "https://images.unsplash.com/photo-1618336753174-8e1e466c433c?q=80&w=600&auto=format&fit=crop",
                description: "After his hometown is destroyed and his mother is killed, young Eren Jaeger vows to cleanse the earth of the giant humanoid Titans."
            },
            {
                id: 4,
                title: "Demon Slayer",
                genre: "Action, Fantasy",
                episodes: 55,
                rating: 8.7,
                image: "https://images.unsplash.com/photo-1614583225154-5fc20b6142c5?q=80&w=600&auto=format&fit=crop",
                description: "A family is attacked by demons and only two members survive - Tanjiro and his sister Nezuko, who is turning into a demon slowly."
            },
            {
                id: 5,
                title: "Jujutsu Kaisen",
                genre: "Action, Supernatural",
                episodes: 47,
                rating: 8.6,
                image: "https://images.unsplash.com/photo-1621416894569-0f39ed31d247?q=80&w=600&auto=format&fit=crop",
                description: "A boy swallows a cursed talisman - the finger of a demon - and becomes cursed himself. He enters a shaman's school to be able to locate the demon's other body parts and thus exorcise himself."
            },
            {
                id: 6,
                title: "My Hero Academia",
                genre: "Action, Superhero",
                episodes: 138,
                rating: 8.3,
                image: "https://images.unsplash.com/photo-1541562232579-512a21360020?q=80&w=600&auto=format&fit=crop",
                description: "A superhero-loving boy without any powers is determined to enroll in a prestigious hero academy and learn what it really means to be a hero."
            }
        ];

        // Function to render anime cards
        function renderAnime() {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = ''; // Clear existing content

            animeData.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'anime-card';
                
                card.innerHTML = `
                    <img src="${anime.image}" alt="${anime.title}" class="anime-image">
                    <div class="anime-info">
                        <h3 class="anime-title">${anime.title}</h3>
                        <div class="anime-meta">
                            <span class="anime-genre">${anime.genre}</span>
                            <span>★ ${anime.rating}</span>
                        </div>
                        <p class="anime-desc">${anime.description}</p>
                        <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 15px;">
                            <span>Episodes: ${anime.episodes}${anime.episodes >= 1000 ? '+' : ''}</span>
                        </div>
                        <a href="#" class="btn-view" onclick="event.preventDefault(); alert('Details page coming soon!');">View Details</a>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Initialize rendering
        document.addEventListener('DOMContentLoaded', renderAnime);
    </script>
</body>
</html>
